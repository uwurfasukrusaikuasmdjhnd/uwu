<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inmobiliaria</title>
</head>
<body>
  <h1>Registrar Propiedad</h1>
  <form id="formPropiedad">
    <input type="text" name="titulo" placeholder="Título" required />
    <input type="text" name="descripcion" placeholder="Descripción" required />
    <input type="number" name="precio" placeholder="Precio" required />
    <button type="submit">Guardar</button>
  </form>

  <h2>Propiedades Guardadas</h2>
  <div id="lista"></div>

  <script>
  document.getElementById("formPropiedad").addEventListener("submit", async function(e) {
    e.preventDefault();
    const formData = new FormData(this);

    await fetch("http://54.226.196.67/api/guardar.php", {
      method: "POST",
      body: formData
    });

    cargarPropiedades();
  });

  async function cargarPropiedades() {
    const response = await fetch("http://54.226.196.67/api/listar.php");
    const data = await response.json();

    const contenedor = document.getElementById("lista");
    contenedor.innerHTML = "";

    data.forEach(p => {
      contenedor.innerHTML += `
        <div>
          <h3>${p.titulo}</h3>
          <p>${p.descripcion}</p>
          <strong>Precio: ${p.precio}</strong>
        </div>
      `;
    });
  }

  cargarPropiedades();
  </script>
</body>
</html>
